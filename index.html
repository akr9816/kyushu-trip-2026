<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

            --primary: #4f46e5;
            --primary-light: #818cf8;

            --text-main: #f8fafc;

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 12px;

        .container { width: 100%; max-width: 650px; display: flex; flex-direction: column; gap: 20px; }
        header {

            font-weight: 800;
            background: linear-gradient(to right, #a5b4fc, #818cf8, #06b6d4);

        header p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; }

            border: 1px solid rgba(6,182,212,0.2);
            border-radius: 12px;
            padding: 12px;

            color: #cffafe;
            text-align: left;
            margin-top: 10px;
            line-height: 1.5;

        .tabs { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0; scrollbar-width: none; }

            border-radius: 24px;
            padding: 24px;
            backdrop-filter: blur(16px);

        .card.active { display: flex; }

        .card-header {

            flex-direction: column;
            gap: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.08);

            align-items: center;
            gap: 8px;

            color: #fff;
            font-size: 0.75rem;
            font-weight: 800;
            padding: 2px 9px;
            border-radius: 8px;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }
        .card-date-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
        }
        .card-title {

            font-weight: 700;
            color: #fff;

        .timeline-item:last-child .marker-line { display: none; }
        .time-content { flex: 1; padding-bottom: 4px; }
        .time-tag {

            color: var(--accent);
            font-weight: 700;
            background: rgba(6,182,212,0.1);

            padding: 2px 8px;
            border-radius: 6px;
            margin-bottom: 4px;
            letter-spacing: 0.3px;

        .time-title { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 5px; margin-top: 3px; }
        .time-desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.65; }
        .decision-section {
            background: rgba(79,70,229,0.08);
            border: 1px solid rgba(129,140,248,0.2);
            border-radius: 20px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;

        .decision-header { display: flex; align-items: center; gap: 8px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 10px; }
        .decision-header h3 { font-size: 0.95rem; font-weight: 700; color: var(--primary-light); }
        .decision-badge { background: var(--accent); color: #0f172a; font-size: 0.65rem; font-weight: 800; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .option-card {
            background: var(--option-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 14px;

            justify-content: center;
            transition: all 0.2s ease;

        .detail-item { font-size: 0.82rem; line-height: 1.55; }
        .detail-label { color: var(--accent); font-weight: 700; margin-right: 3px; }
        .detail-val { color: var(--text-main); }
        .option-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .meta-item { background: rgba(255,255,255,0.05); padding: 3px 9px; border-radius: 6px; color: var(--text-muted); font-size: 0.72rem; }
        .option-card.selected .meta-item { background: rgba(129,140,248,0.15); color: var(--primary-light); }
        .info-box {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 14px;

        .info-name { font-size: 0.85rem; font-weight: 700; color: #fff; line-height: 1.5; }
        .nav-buttons { display: flex; justify-content: space-between; gap: 12px; }
        .nav-btn {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 14px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            text-align: center;
            font-family: inherit;

        .nav-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }
        .share-panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }
        .share-btn {

            color: #fff;
            padding: 12px 24px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
            font-family: inherit;
            width: 100%;
            outline: none;
        }
        .share-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35);
            background: linear-gradient(135deg, #047857 0%, #059669 100%);

        .share-btn:active {
            transform: translateY(0);
        }
        .share-status {
            font-size: 0.8rem;
            color: #34d399;
            font-weight: 600;
            min-height: 1.2rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .share-status.show {
            opacity: 1;
        }
    </style>
</head>

<div class="container">

<script>
var itinerary = [
    {
        day: 1,
        date: "6/16 (二)",
        title: "啟程福岡 > 別府溫泉",
        route: "福岡機場 > 別府",
        events: [
            {
                time: "06:45",
                title: "虎航 IT240 起飛",

            },
            {
                time: "10:05",

        getEvents: function(votes) {
            var evts = this.events.slice();
            var choice = votes['d1-route'] || 'd1-a';
            if (choice === 'd1-a') {
                evts = evts.concat([
                    { time: "13:00-14:00", title: "自駕：山田 SA > 由布院", desc: "前往日本極受歡迎的溫泉小鎮「由布院」（約 1 小時車程）。" },
                    { time: "14:00-15:30", title: "由布院慢活（金鱗湖與湯之坪街道）", desc: "漫步金鱗湖、逛湯之坪街道，吃 Milch 起司蛋糕或 B-Speak 蛋糕捲。" },

            } else {

                    { time: "13:00-14:15", title: "自駕直奔別府明礬溫泉", desc: "自山田 SA 一路行駛，直奔別府明礬溫泉（約 1 小時 15 分鐘車程）。行程更為從容。" },

                    { time: "15:30-16:00", title: "湯霧展望台", desc: "中停湯霧展望台，俯瞰鐵輪溫泉街裊裊上升的溫泉白煙，此為日本重要文化景觀。" },

        },
        decisions: [
            {
                id: "d1-route",
                title: "D1 景點動線抉擇：是否順遊由布院",
                options: [
                    {
                        id: "d1-a",
                        name: "方案 A：順遊由布院溫泉小鎮",

                            { label: "龜正壽司", val: "Mapcode: 46 488 166*52 | 建議 17:35 前抵達以避開人潮" }
                        ]
                    }
                ]
            }
        ],
        lodging: "別府新鶴田飯店 | 地址：大分県別府市北浜 1-14-15 | 電話：0977-22-1110 | 備註：先到先得付費車位 700 日圓/晚，6 樓有別府灣景露天溫泉"
    },
    {
        day: 2,
        date: "6/17 (三)",
        title: "山脈公路 > 鍋瀑布 > 黑川 > 大觀峰 > 阿蘇烤肉",
        route: "別府 > 長者原 > 鍋瀑布 > 黑川 > 大觀峰 > 阿蘇",
        events: [
            {
                time: "09:00-09:30",
                title: "別府新鶴田飯店退房出發",
                desc: "行李放上車，迎著晨光開啟阿蘇高原自駕之旅。"

            {

                title: "山脈公路（Yamanami Highway）> 長者原中停",

                desc: "天神地下街大採購，下午移動至博多運河城繼續血拼。可逛中洲川端商圈、百貨公司與電器量販店，進行最後衝刺採購。"
            },
            {
                time: "18:30 以後",
                title: "博多華味鳥 水炊雞肉鍋晚餐",
                desc: "享用乳白色濃郁湯底的博多名物「水炊鍋」，完美療癒雙腿，慶祝美好旅程最後一夜！"
            }
        ],
        lodging: "Rakuten STAY 博多祇園（連住第二晚）"
    },
    {
        day: 8,
        date: "6/23 (二)",
        title: "平安返台",
        route: "博多 > 福岡機場 > 台北桃園",
        events: [
            {
                time: "07:30-08:00",
                title: "自助平板退房 > 地鐵前往機場",
                desc: "祇園站搭地鐵空港線至國內線（約 6 分鐘），轉搭免費穿梭巴士直達國際線航廈（約 12 分鐘）。"
            },
            {
                time: "08:30",
                title: "虎航 IT241 辦理登機（10:10 關櫃！）",
                desc: "請務必於 08:30 前抵達國際線虎航櫃台排隊辦理託運，10:10 準時關櫃。最後在免稅店掃貨後登機。"
            },
            {
                time: "10:55 起飛",
                title: "虎航 IT241 起飛返台",
                desc: "福岡機場 (FUK) 起飛，12:25 順利降落台北桃園國際機場 (TPE)。帶著滿滿的九州回憶平安返家！"
            }
        ],
        lodging: "溫暖的家"
    }
];

var currentDay = 1;
var votes = {};

function initApp() {
    var tabContainer = document.getElementById('tabContainer');
    var cardContainer = document.getElementById('cardContainer');

    itinerary.forEach(function(item, index) {
        var hasDecision = item.decisions && item.decisions.length > 0;
        var tab = document.createElement('button');
        tab.className = 'tab-btn' + (index === 0 ? ' active' : '') + (hasDecision ? ' has-choice' : '');
        tab.textContent = 'D' + item.day;
        tab.id = 'tab-d' + item.day;
        (function(d) { tab.onclick = function() { switchDay(d); }; })(item.day);
        tabContainer.appendChild(tab);

        var card = document.createElement('div');
        card.className = 'card' + (index === 0 ? ' active' : '');
        card.id = 'card-d' + item.day;

        var eventsHtml = '<div class="timeline" id="timeline-d' + item.day + '"></div>';

        var decisionsHtml = '';
        if (hasDecision) {
            item.decisions.forEach(function(dec) {
                decisionsHtml += '<div class="decision-section"><div class="decision-header"><span class="decision-badge">討論抉擇</span><h3>' + dec.title + '</h3></div><div class="options-list">';
                dec.options.forEach(function(opt) {
                    var metaHtml = '<div class="option-meta">';
                    opt.meta.forEach(function(m) { metaHtml += '<span class="meta-item">' + m + '</span>'; });
                    metaHtml += '</div>';
                    var detailsHtml = '<div class="option-details-list">';
                    opt.details.forEach(function(det) {
                        detailsHtml += '<div class="detail-item"><span class="detail-label">&#9670; ' + det.label + '：</span><span class="detail-val">' + det.val + '</span></div>';
                    });
                    detailsHtml += '</div>';
                    (function(dayNum, optId, decId) {
                        decisionsHtml += '<div class="option-card" id="' + optId + '" onclick="selectOption(\'' + dayNum + '\',\'' + optId + '\',\'' + decId + '\')">';
                    })(item.day, opt.id, dec.id);
                    decisionsHtml += '<div class="option-title-row"><span class="option-name">' + opt.name + '</span><div class="vote-indicator"></div></div>';
                    decisionsHtml += '<div class="option-desc">' + opt.desc + '</div>';
                    decisionsHtml += detailsHtml;
                    decisionsHtml += metaHtml;
                    decisionsHtml += '</div>';
                });
                decisionsHtml += '</div></div>';
            });
        }

        var lodgingHtml = '<div class="info-box"><div class="info-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></div><div class="info-details"><span class="info-label">本日住宿地點</span><span class="info-name">' + item.lodging + '</span></div></div>';

        var headerHtml = '<div class="card-header">' +
            '<div class="card-day-row">' +
            '<span class="card-day-label">D' + item.day + '</span>' +
            '<span class="card-date-label">' + item.date + '</span>' +
            '</div>' +
            '<span class="card-title">' + item.title + '</span>' +
            '<span class="card-badge">' + item.route + '</span>' +
            '</div>';

        card.innerHTML = headerHtml + eventsHtml + decisionsHtml + lodgingHtml;
        cardContainer.appendChild(card);
    });

    loadSavedChoices();
    
    // Render timelines after loading choices
    itinerary.forEach(function(item) {
        renderTimeline(item.day);
    });
}

function renderTimeline(dayNum) {
    var dayData = null;
    for (var i = 0; i < itinerary.length; i++) {
        if (itinerary[i].day == dayNum) { dayData = itinerary[i]; break; }
    }
    if (!dayData) return;
    
    var timelineEl = document.getElementById('timeline-d' + dayNum);
    if (!timelineEl) return;
    
    var evts = dayData.getEvents ? dayData.getEvents(votes) : dayData.events;
    var eventsHtml = '';
    evts.forEach(function(evt) {
        eventsHtml += '<div class="timeline-item"><div class="time-marker"><div class="marker-dot"></div><div class="marker-line"></div></div><div class="time-content">';
        eventsHtml += '<div class="time-tag">' + evt.time + '</div>';
        eventsHtml += '<div class="time-title">' + evt.title + '</div>';
        eventsHtml += '<div class="time-desc">' + evt.desc + '</div>';
        eventsHtml += '</div></div>';
    });
    timelineEl.innerHTML = eventsHtml;
}

function switchDay(dayNum) {
    document.querySelectorAll('.tab-btn').forEach(function(btn) { btn.classList.remove('active'); });
    document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('active'); });
    var tab = document.getElementById('tab-d' + dayNum);
    var card = document.getElementById('card-d' + dayNum);
    if (tab) { tab.classList.add('active'); tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }); }
    if (card) card.classList.add('active');
    currentDay = dayNum;
}

function selectOption(dayNum, optionId, decisionId) {
    var dayData = null;
    for (var i = 0; i < itinerary.length; i++) {
        if (itinerary[i].day == dayNum) { dayData = itinerary[i]; break; }
    }
    if (!dayData || !dayData.decisions) return;
    var dec = null;
    for (var j = 0; j < dayData.decisions.length; j++) {
        if (dayData.decisions[j].id == decisionId) { dec = dayData.decisions[j]; break; }
    }
    if (!dec) return;
    dec.options.forEach(function(opt) {
        var el = document.getElementById(opt.id);
        if (el) el.classList.remove('selected');
    });
    var clicked = document.getElementById(optionId);
    if (clicked) clicked.classList.add('selected');
    votes[decisionId] = optionId;
    try { localStorage.setItem('kyushu_votes', JSON.stringify(votes)); } catch(e) {}
    
    renderTimeline(dayNum);
    if (dayNum == 5) {
        renderTimeline(4);
    }
}

function loadSavedChoices() {
    try {
        var saved = localStorage.getItem('kyushu_votes');
        if (!saved) return;
        var parsed = JSON.parse(saved);
        Object.keys(parsed).forEach(function(decisionId) {
            for (var i = 0; i < itinerary.length; i++) {
                var item = itinerary[i];
                if (!item.decisions) continue;
                for (var j = 0; j < item.decisions.length; j++) {
                    if (item.decisions[j].id == decisionId) {
                        selectOption(item.day, parsed[decisionId], decisionId);
                        break;
                    }
                }
            }
        });
    } catch(e) {}
}

function nextDay() {
    if (currentDay < itinerary.length) { switchDay(currentDay + 1); } else { switchDay(1); }
}

function prevDay() {
    if (currentDay > 1) { switchDay(currentDay - 1); } else { switchDay(itinerary.length); }
}

function copyVotesToClipboard() {
    var text = "🗳️ 【九州 8 天 7 夜自駕行程】我的方案投票結果 🗳️\n";
    text += "-----------------------------------------\n";
    var totalDecisions = 0;
    var completedDecisions = 0;
    
    itinerary.forEach(function(item) {
        if (!item.decisions || item.decisions.length === 0) return;
        text += "📅 D" + item.day + " " + item.date + " " + item.title + "\n";
        
        item.decisions.forEach(function(dec) {
            totalDecisions++;
            var selectedOptId = votes[dec.id];
            var selectedOptName = "[尚未投票]";
            
            if (selectedOptId) {
                for (var k = 0; k < dec.options.length; k++) {
                    if (dec.options[k].id === selectedOptId) {
                        selectedOptName = dec.options[k].name;
                        completedDecisions++;
                        break;
                    }
                }
            }
            text += "   📌 " + dec.title + "：\n   👉 " + selectedOptName + "\n\n";
        });
    });
    
    text += "-----------------------------------------\n";
    text += "📊 投票進度：" + completedDecisions + " / " + totalDecisions + "\n";
    text += "👉 網頁連結：https://akr9816.github.io/kyushu-trip-2026/";
    
    var tempInput = document.createElement("textarea");
    tempInput.style.position = "absolute";
    tempInput.style.left = "-9999px";
    tempInput.value = text;
    document.body.appendChild(tempInput);
    tempInput.select();
    
    var success = false;
    try {
        success = document.execCommand("copy");
    } catch (err) {}
    document.body.removeChild(tempInput);
    
    var statusEl = document.getElementById("shareStatus");
    if (statusEl) {
        if (success) {
            statusEl.textContent = "✓ 複製成功！已複製至剪貼簿，可直接貼到 LINE 群組";
            statusEl.style.color = "#34d399";
        } else {
            statusEl.textContent = "✗ 複製失敗，請手動複製";
            statusEl.style.color = "#ef4444";
        }
        statusEl.classList.add("show");
        setTimeout(function() {
            statusEl.classList.remove("show");
        }, 3000);
    }
}

window.onload = initApp;
</script>
</body>
